<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Расписание РГПУ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>
    <style>
        :root { --bg: #000000; --card: #121214; --accent: #ff9f0a; --text: #ffffff; --text-sec: #98989d; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 16px; padding-top: 70px; }
        .header-fixed { position: fixed; top: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); padding: 10px 16px; z-index: 100; display: flex; gap: 10px; }
        .search-input { width: 100%; background: #1c1c1e; border: none; border-radius: 12px; padding: 10px; color: white; outline: none; }
        .icon-btn { background: #1c1c1e; border: none; border-radius: 12px; width: 42px; height: 42px; color: var(--accent); cursor: pointer; }
        .nav-container { margin-top: 10px; display: flex; flex-direction: column; gap: 12px; }
        #groupSelect { width: 100%; background: #1c1c1e; color: white; border: none; border-radius: 12px; padding: 10px; outline: none; }
        .tabs { display: flex; background: #1c1c1e; padding: 3px; border-radius: 12px; }
        .tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; border-radius: 10px; color: var(--text-sec); cursor: pointer; }
        .tab.active { background: #323234; color: white; font-weight: 600; }
        .lesson-card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 14px; border-left: 4px solid var(--accent); }
        .time-badge { color: var(--accent); font-weight: 700; }
        .date-display { font-size: 22px; font-weight: 800; margin: 15px 0; }
        .empty { text-align: center; margin-top: 50px; color: var(--text-sec); }
    </style>
</head>
<body>
    <div class="header-fixed">
        <input type="text" id="groupSearch" class="search-input" placeholder="Поиск группы..." oninput="filterGroups()">
        <button class="icon-btn" id="calendarBtn">📅</button>
    </div>

    <div class="nav-container">
        <select id="groupSelect" onchange="onGroupChange(this.value)">
            <option value="">Выберите группу</option>
        </select>
        <div class="tabs">
            <div class="tab" id="tab-yesterday" onclick="changeDate(-1)">Вчера</div>
            <div class="tab active" id="tab-today" onclick="changeDate(0)">Сегодня</div>
            <div class="tab" id="tab-tomorrow" onclick="changeDate(1)">Завтра</div>
        </div>
    </div>

    <div id="currentDateLabel" class="date-display"></div>
    <div id="scheduleList"></div>
    <input type="text" id="datePicker" style="display:none">

    <script>
        let allGroups = [];
        let currentGroupId = localStorage.getItem('selected_group_id');
        let selectedDate = new Date();

        const fp = flatpickr("#datePicker", {
            locale: "ru", dateFormat: "Y-m-d",
            onChange: (d) => { selectedDate = d[0]; resetTabs(); loadSchedule(); }
        });
        document.getElementById('calendarBtn').onclick = () => fp.open();

        async function init() {
            const res = await fetch('/api/groups');
            const data = await res.json();
            allGroups = data.groups || [];
            renderGroups(allGroups);
            if (currentGroupId) {
                document.getElementById('groupSelect').value = currentGroupId;
                loadSchedule();
            }
        }

        function renderGroups(groups) {
            const select = document.getElementById('groupSelect');
            select.innerHTML = '<option value="">Выберите группу</option>';
            groups.forEach(g => select.add(new Option(g.name, g.id)));
        }

        function filterGroups() {
            const val = document.getElementById('groupSearch').value.toLowerCase();
            const select = document.getElementById('groupSelect');
            const options = select.options;
            for (let i = 1; i < options.length; i++) {
                options[i].style.display = options[i].text.toLowerCase().includes(val) ? 'block' : 'none';
            }
        }

        function onGroupChange(id) {
            currentGroupId = id;
            localStorage.setItem('selected_group_id', id);
            loadSchedule();
        }

        function changeDate(offset) {
            selectedDate = new Date();
            selectedDate.setDate(selectedDate.getDate() + offset);
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === offset + 1));
            loadSchedule();
        }

        function resetTabs() { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); }

        async function loadSchedule() {
            const list = document.getElementById('scheduleList');
            if (!currentGroupId) return;
            document.getElementById('currentDateLabel').innerText = selectedDate.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', weekday: 'short' });
            list.innerHTML = '<div class="empty">Загрузка...</div>';
            
            const dateStr = selectedDate.toISOString().split('T')[0];
            const r = await fetch(`/api/schedule?group_id=${currentGroupId}&date=${dateStr}`);
            const data = await r.json();
            
            if (!data.lessons || data.lessons.length === 0) {
                list.innerHTML = '<div class="empty">Пар нет 🥂</div>';
                return;
            }

            list.innerHTML = data.lessons.map(l => `
                <div class="lesson-card">
                    <div><span class="time-badge">${l.time_start} — ${l.time_end}</span></div>
                    <div style="font-weight:bold; font-size:18px; margin:8px 0;">${l.subject}</div>
                    <div style="color:var(--text-sec)">🏛️ ${l.room} | 👤 ${l.teacher}</div>
                </div>
            `).join('');
        }
        init();
    </script>
</body>
</html>
