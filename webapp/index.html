<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Расписание</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

:root{
--bg:#0f0f0f;
--surface:#1a1a1a;
--surface2:#222;
--border:#2e2e2e;
--accent:#4d9fff;
--accent2:#7c5cbf;
--text:#f0f0f0;
--text2:#888;
--text3:#555;
--green:#3ecf8e;
--orange:#f59e0b;
--pink:#f472b6;
--radius:16px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

body{
font-family:'Manrope',sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
}

.header{
padding:16px 16px 0;
position:sticky;
top:0;
z-index:100;
background:var(--bg);
}

.header-top{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:14px;
}

.group-badge{
display:flex;
align-items:center;
gap:8px;
background:var(--surface);
border:1px solid var(--border);
border-radius:12px;
padding:8px 12px;
cursor:pointer;
}

.group-badge .dot{
width:8px;
height:8px;
background:var(--green);
border-radius:50%;
box-shadow:0 0 6px var(--green);
}

.group-badge span{
font-size:14px;
font-weight:700;
}

.notify-btn{
width:38px;
height:38px;
background:var(--surface);
border:1px solid var(--border);
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:18px;
}

.tabs{
display:flex;
gap:6px;
padding-bottom:14px;
overflow-x:auto;
}

.tab{
flex-shrink:0;
padding:7px 16px;
border-radius:10px;
font-size:13px;
font-weight:600;
cursor:pointer;
color:var(--text2);
}

.tab.active{
background:var(--accent);
color:#fff;
}

.main{
padding:8px 16px 100px;
}

.loading{
text-align:center;
padding:60px 20px;
color:var(--text2);
font-size:14px;
}

.spinner{
width:32px;
height:32px;
border:3px solid var(--border);
border-top-color:var(--accent);
border-radius:50%;
animation:spin .8s linear infinite;
margin:0 auto 16px;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

.empty{
text-align:center;
padding:60px 20px;
}

.empty .emoji{
font-size:52px;
margin-bottom:16px;
}

.empty h3{
font-size:17px;
font-weight:700;
margin-bottom:8px;
}

.empty p{
font-size:14px;
color:var(--text2);
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(15,15,15,0.95);
border-top:1px solid var(--border);
padding:10px 16px 20px;
display:flex;
gap:8px;
}

.nav-btn{
flex:1;
padding:10px;
border-radius:12px;
font-size:12px;
font-weight:700;
cursor:pointer;
text-align:center;
background:var(--surface);
color:var(--text2);
border:1px solid var(--border);
}

.nav-btn.active{
background:var(--accent);
color:#fff;
}

.nav-icon{
font-size:18px;
display:block;
margin-bottom:2px;
}
</style>
</head>

<body>

<div class="header">

<div class="header-top">
<div class="group-badge" onclick="openGroupModal()">
<div class="dot"></div>
<span id="groupName">Выбери группу</span>
</div>

<div class="notify-btn" id="notifyBtn" onclick="toggleNotify()">🔔</div>
</div>

<div class="tabs" id="tabs"></div>

</div>

<div class="main" id="main">
<div class="loading">
<div class="spinner"></div>
Загрузка...
</div>
</div>

<div class="bottom-nav">

<div class="nav-btn active" id="navToday" onclick="switchView('today')">
<span class="nav-icon">📅</span>
Сегодня
</div>

<div class="nav-btn" id="navTomorrow" onclick="switchView('tomorrow')">
<span class="nav-icon">🗓</span>
Завтра
</div>

<div class="nav-btn" id="navWeek" onclick="switchView('week')">
<span class="nav-icon">📆</span>
Неделя
</div>

</div>

<script>

const tg = window.Telegram?.WebApp
if(tg){
tg.ready()
tg.expand()
}

let state={
groupId:localStorage.getItem("groupId")||null,
groupName:localStorage.getItem("groupName")||null,
notify:localStorage.getItem("notify")!=="false"
}

function showLoading(){
document.getElementById("main").innerHTML=
'<div class="loading"><div class="spinner"></div>Загрузка расписания...</div>'
}

function showEmpty(emoji,title,text){
document.getElementById("main").innerHTML=
`
<div class="empty">
<div class="emoji">${emoji}</div>
<h3>${title}</h3>
<p>${text}</p>
</div>
`
}

function toggleNotify(){
state.notify=!state.notify
localStorage.setItem("notify",state.notify)

if(tg){
tg.sendData(JSON.stringify({
action:"toggle_notify",
notify:state.notify
}))
}

document.getElementById("notifyBtn").style.opacity=state.notify?1:0.5
}

function openGroupModal(){
alert("Здесь будет выбор группы (подключается к /api/groups)")
}

function switchView(view){

if(view==="today") loadSchedule(0)
if(view==="tomorrow") loadSchedule(1)
if(view==="week") loadWeek()

}

async function loadSchedule(offset){

if(!state.groupId){
showEmpty("👋","Привет","Сначала выбери группу")
return
}

showLoading()

let d=new Date()
d.setDate(d.getDate()+offset)

let date=d.toISOString().slice(0,10)

try{

let r=await fetch(`/api/schedule?group_id=${state.groupId}&date=${date}`)
let data=await r.json()

renderLessons(data.lessons||[])

}catch(e){

showEmpty("😕","Ошибка","Не удалось загрузить расписание")

}

}

async function loadWeek(){

if(!state.groupId){
showEmpty("👋","Привет","Сначала выбери группу")
return
}

showLoading()

try{

let today=new Date().toISOString().slice(0,10)

let r=await fetch(`/api/schedule/week?group_id=${state.groupId}&date=${today}`)
let data=await r.json()

renderWeek(data.week||{})

}catch(e){

showEmpty("😕","Ошибка","Не удалось загрузить расписание")

}

}

function renderLessons(list){

if(!list.length){
showEmpty("🎉","Пар нет","Сегодня свободный день")
return
}

let html=""

for(let l of list){

html+=`
<div style="background:#1a1a1a;border:1px solid #2e2e2e;border-radius:16px;padding:14px;margin-bottom:10px">

<div style="font-weight:700;color:#4d9fff">${l.time_start} — ${l.time_end}</div>

<div style="font-weight:700;margin-top:4px">${l.subject}</div>

${l.teacher?`<div style="font-size:12px;color:#888">👤 ${l.teacher}</div>`:""}

${l.room?`<div style="font-size:12px;color:#888">🏛 ${l.room}</div>`:""}

</div>
`

}

document.getElementById("main").innerHTML=html

}

function renderWeek(week){

let html=""

for(let day in week){

let lessons=week[day]

if(!lessons.length) continue

html+=`<h3 style="margin:12px 0">${day}</h3>`

for(let l of lessons){

html+=`
<div style="background:#1a1a1a;border:1px solid #2e2e2e;border-radius:16px;padding:14px;margin-bottom:10px">

<div style="font-weight:700;color:#4d9fff">${l.time_start} — ${l.time_end}</div>

<div style="font-weight:700;margin-top:4px">${l.subject}</div>

</div>
`

}

}

document.getElementById("main").innerHTML=html

}

</script>

</body>
</html>
