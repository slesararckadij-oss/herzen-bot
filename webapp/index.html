<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #0a84ff; --text: #fff; --sec: #8e8e93; }
        body { font-family: -apple-system; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav { display: flex; gap: 15px; color: var(--sec); font-size: 14px; margin-bottom: 20px; }
        .nav .active { color: var(--accent); font-weight: bold; }
        .group-title { font-size: 28px; font-weight: bold; margin-bottom: 5px; }
        .date-sub { color: var(--sec); text-transform: uppercase; font-size: 12px; margin-bottom: 20px; }
        select { width: 100%; background: var(--card); border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 20px; }
        .lesson { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 12px; }
        .l-head { display: flex; justify-content: space-between; color: var(--sec); font-size: 13px; margin-bottom: 8px; }
        .l-name { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
        .l-foot { font-size: 13px; color: var(--sec); display: flex; flex-direction: column; gap: 4px; }
        .teacher { color: var(--accent); }
    </style>
</head>
<body>
    <div class="header"><span>Расписание занятий ✅</span><span>📅</span></div>
    <div class="nav"><span>Вчера</span><span class="active">Сегодня</span><span>Завтра</span></div>
    <div id="group-display" class="group-title">Выберите группу</div>
    <div id="date-display" class="date-sub"></div>

    <select id="g-select" onchange="updateGroup()"><option>Загрузка групп...</option></select>
    <div id="list"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        async function loadGroups() {
            const r = await fetch('/api/groups');
            const d = await r.json();
            const s = document.getElementById('g-select');
            s.innerHTML = '<option value="">Выбрать...</option>';
            d.groups.forEach(g => s.add(new Option(g.name, g.id)));
        }

        async function updateGroup() {
            const s = document.getElementById('g-select');
            const g_id = s.value;
            const g_name = s.options[s.selectedIndex].text;
            if(!g_id) return;
            
            document.getElementById('group-display').innerText = g_name;
            
            // Отправляем выбор боту
            tg.sendData(JSON.stringify({action: "set_group", group_id: g_id, group_name: g_name}));
            
            // Загружаем пары
            const date = new Date().toISOString().split('T')[0];
            const r = await fetch(`/api/schedule?group_id=${g_id}&date=${date}`);
            const data = await r.json();
            render(data.lessons);
        }

        function render(lessons) {
            const container = document.getElementById('list');
            container.innerHTML = lessons.length ? '' : '<p style="color:gray">Пар нет</p>';
            lessons.forEach(l => {
                container.innerHTML += `
                    <div class="lesson">
                        <div class="l-head"><span>${l.time_start} - ${l.time_end}</span><span>${l.type}</span></div>
                        <div class="l-name">${l.subject}</div>
                        <div class="l-foot">
                            <span>🏛 ${l.room}</span>
                            <span class="teacher">👤 ${l.teacher}</span>
                        </div>
                    </div>`;
            });
        }

        document.getElementById('date-display').innerText = new Date().toLocaleDateString('ru-RU', {weekday:'long', day:'numeric', month:'long'});
        loadGroups();
    </script>
</body>
</html>
