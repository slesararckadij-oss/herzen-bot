<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Выбор группы</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
button { margin: 5px 0; padding: 8px 12px; font-size: 16px; }
#groups { max-height: 400px; overflow-y: auto; margin-top: 10px; }
</style>
</head>
<body>
<h2>Выберите группу</h2>
<div id="loading">Загрузка...</div>
<div id="groups"></div>

<script>
const groupsDiv = document.getElementById("groups");
const loadingDiv = document.getElementById("loading");

async function loadGroups() {
    try {
        const res = await fetch("/api/groups");
        const data = await res.json();
        const groups = data.groups || [];

        if (!groups.length) {
            loadingDiv.textContent = "Группы не найдены";
            return;
        }

        loadingDiv.style.display = "none";
        groups.forEach(g => {
            const btn = document.createElement("button");
            btn.textContent = g.name;
            btn.onclick = () => selectGroup(g);
            groupsDiv.appendChild(btn);
        });
    } catch (err) {
        console.error(err);
        loadingDiv.textContent = "Ошибка загрузки групп";
    }
}

function selectGroup(group) {
    if (window.Telegram?.WebApp) {
        Telegram.WebApp.sendData(JSON.stringify({
            action: "set_group",
            group_id: group.id,
            group_name: group.name
        }));
        alert(`Группа ${group.name} выбрана!`);
    } else {
        alert("Ошибка: Telegram WebApp недоступен");
    }
}

loadGroups();
</script>
</body>
</html>
