<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Расписание РГПУ</title>
    <style>
        :root {
            --bg: #0b0b0d;
            --card: #1c1c1e;
            --accent: #0a84ff;
            --text: #ffffff;
            --text-secondary: #8e8e93;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }

        /* Поиск и выбор группы */
        .group-container {
            position: sticky;
            top: 0;
            background: var(--bg);
            padding-bottom: 10px;
            z-index: 10;
        }
        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--card);
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 8px;
        }
        select {
            width: 100%;
            padding: 12px;
            background: var(--card);
            color: white;
            border: 1px solid #333;
            border-radius: 12px;
            font-size: 16px;
            appearance: none;
        }

        /* Табы (Вчера, Сегодня, Завтра) */
        .tabs {
            display: flex;
            background: var(--card);
            padding: 4px;
            border-radius: 10px;
            margin: 15px 0;
        }
        .tab {
            flex: 1;
            padding: 8px 0;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            color: var(--text-secondary);
            transition: 0.2s;
            cursor: pointer;
        }
        .tab.active {
            background: #3a3a3c;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Карточки занятий */
        .lesson-card {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
        }
        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .subject-name {
            font-size: 17px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 10px;
        }
        .meta-info {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .meta-info a {
            color: var(--accent);
            text-decoration: none;
        }

        /* Кнопки ссылок */
        .links-row {
            margin-top: 12px;
            display: flex;
            gap: 10px;
        }
        .moodle-link {
            font-size: 13px;
            color: #ff9f0a;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 40px;
            font-size: 15px;
        }

        .loader {
            text-align: center;
            padding: 20px;
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="group-container">
        <input type="text" id="groupSearch" class="search-input" placeholder="🔍 Поиск группы..." oninput="filterGroups()">
        <select id="groupSelect" onchange="onGroupChange(this.value)">
            <option value="">Выберите из списка</option>
        </select>
    </div>

    <div class="tabs">
        <div class="tab" id="tab-yesterday" onclick="changeDate(-1)">Вчера</div>
        <div class="tab active" id="tab-today" onclick="changeDate(0)">Сегодня</div>
        <div class="tab" id="tab-tomorrow" onclick="changeDate(1)">Завтра</div>
    </div>

    <div id="scheduleList"></div>

    <script>
        let allGroups = [];
        let currentGroupId = localStorage.getItem('selected_group_id');
        let currentOffset = 0;

        // Запуск
        init();

        async function init() {
            try {
                const res = await fetch('/api/groups');
                const data = await res.json();
                allGroups = data.groups;
                
                renderGroups(allGroups);

                if (currentGroupId) {
                    document.getElementById('groupSelect').value = currentGroupId;
                    loadSchedule();
                }
            } catch (e) { console.error("Init error", e); }
        }

        function renderGroups(groups) {
            const select = document.getElementById('groupSelect');
            select.innerHTML = '<option value="">Выберите из списка</option>';
            groups.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g.id;
                opt.textContent = g.name;
                if (g.id === currentGroupId) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function filterGroups() {
            const val = document.getElementById('groupSearch').value.toLowerCase();
            const filtered = allGroups.filter(g => g.name.toLowerCase().includes(val));
            renderGroups(filtered);
        }

        function onGroupChange(id) {
            currentGroupId = id;
            localStorage.setItem('selected_group_id', id);
            loadSchedule();
        }

        function changeDate(offset) {
            currentOffset = offset;
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', i === offset + 1);
            });
            loadSchedule();
        }

        // КОРРЕКТНЫЙ РАСЧЕТ ДАТЫ (фикс "Вчера")
        function getFormattedDate(offset) {
            const d = new Date();
            d.setHours(0,0,0,0);
            d.setDate(d.getDate() + offset);
            
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        async function loadSchedule() {
            const list = document.getElementById('scheduleList');
            if (!currentGroupId) {
                list.innerHTML = '<div class="empty-state">Выберите группу выше 👆</div>';
                return;
            }

            list.innerHTML = '<div class="loader">Загрузка пар...</div>';
            
            const dateStr = getFormattedDate(currentOffset);
            try {
                const r = await fetch(`/api/schedule?group_id=${currentGroupId}&date=${dateStr}`);
                const data = await r.json();
                
                if (!data.lessons || data.lessons.length === 0) {
                    list.innerHTML = '<div class="empty-state">На этот день пар нет 😴</div>';
                    return;
                }

                list.innerHTML = '';
                data.lessons.forEach(l => {
                    const card = `
                        <div class="lesson-card">
                            <div class="time-row">
                                <span>🕒 ${l.time_start} — ${l.time_end}</span>
                                <span>${l.type}</span>
                            </div>
                            <div class="subject-name">${l.subject}</div>
                            <div class="meta-info">🏛️ ${l.room || 'Аудитория не указана'}</div>
                            <div class="meta-info">
                                👤 ${l.teacher_url ? `<a href="${l.teacher_url}" target="_blank">${l.teacher}</a>` : l.teacher}
                            </div>
                            ${l.moodle_url ? `
                                <div class="links-row">
                                    <a href="${l.moodle_url}" target="_blank" class="moodle-link">📚 Открыть в Moodle</a>
                                </div>
                            ` : ''}
                        </div>
                    `;
                    list.innerHTML += card;
                });
            } catch (e) {
                list.innerHTML = '<div class="empty-state">Ошибка сети. Попробуйте позже.</div>';
            }
        }
    </script>
</body>
</html>
