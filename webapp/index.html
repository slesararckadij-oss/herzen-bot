<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Расписание</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1c1c1e; --text: #ffffff; --hint: #8e8e93; --blue: #0a84ff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .header { margin-bottom: 20px; }
        select { width: 100%; padding: 12px; background: var(--card); color: #fff; border: 1px solid #333; border-radius: 10px; font-size: 16px; margin-bottom: 15px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; background: var(--card); border-radius: 8px; font-size: 14px; cursor: pointer; }
        .tab.active { background: var(--blue); }
        .lesson { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 12px; border-left: 4px solid var(--blue); }
        .time { font-size: 14px; color: var(--hint); margin-bottom: 5px; display: flex; justify-content: space-between; }
        .subject { font-size: 16px; font-weight: bold; margin-bottom: 8px; line-height: 1.3; }
        .info { font-size: 14px; color: var(--hint); display: flex; align-items: center; gap: 5px; margin-top: 5px; }
        .link-btn { display: inline-block; margin-top: 10px; color: var(--blue); text-decoration: none; font-size: 14px; border: 1px solid var(--blue); padding: 5px 10px; border-radius: 5px; }
        a { color: var(--blue); text-decoration: none; }
        .empty { text-align: center; color: var(--hint); margin-top: 50px; }
    </style>
</head>
<body>
    <div class="header">
        <select id="groupSelect" onchange="changeGroup(this.value)">
            <option value="">Выберите группу...</option>
        </select>
    </div>

    <div class="tabs">
        <div class="tab" onclick="loadSchedule(-1)">Вчера</div>
        <div class="tab active" onclick="loadSchedule(0)">Сегодня</div>
        <div class="tab" onclick="loadSchedule(1)">Завтра</div>
    </div>

    <div id="list"></div>

    <script>
        let currentGroupId = localStorage.getItem('herzen_group_id');
        let currentOffset = 0;

        async function init() {
            const r = await fetch('/api/groups');
            const data = await r.json();
            const select = document.getElementById('groupSelect');
            data.groups.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g.id; opt.textContent = g.name;
                if (g.id === currentGroupId) opt.selected = true;
                select.appendChild(opt);
            });
            if (currentGroupId) loadSchedule(0);
        }

        function changeGroup(id) {
            currentGroupId = id;
            localStorage.setItem('herzen_group_id', id);
            loadSchedule(0);
        }

        function getDateStr(offset) {
            const d = new Date();
            d.setDate(d.getDate() + offset);
            return d.toISOString().split('T')[0];
        }

        async function loadSchedule(offset) {
            currentOffset = offset;
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === offset + 1));
            const list = document.getElementById('list');
            if (!currentGroupId) { list.innerHTML = '<div class="empty">Сначала выберите группу</div>'; return; }
            
            list.innerHTML = '<div class="empty">Загрузка...</div>';
            const date = getDateStr(offset);
            const r = await fetch(`/api/schedule?group_id=${currentGroupId}&date=${date}`);
            const data = await r.json();
            
            list.innerHTML = data.lessons.length ? '' : '<div class="empty">Пар нет 🥳</div>';
            data.lessons.forEach(l => {
                list.innerHTML += `
                    <div class="lesson">
                        <div class="time"><span>${l.time_start} – ${l.time_end}</span><span>${l.type}</span></div>
                        <div class="subject">${l.subject}</div>
                        <div class="info">📍 ${l.room || 'Не указана'}</div>
                        <div class="info">👤 ${l.teacher_url ? `<a href="${l.teacher_url}" target="_blank">${l.teacher}</a>` : l.teacher}</div>
                        ${l.moodle_url ? `<a href="${l.moodle_url}" target="_blank" class="link-btn">Открыть в Moodle</a>` : ''}
                    </div>`;
            });
        }
        init();
    </script>
</body>
</html>
